# Development overrides. Live-reload and source mounts.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# DO NOT use this file in production. docker compose up (without -f flags) uses
# docker-compose.yml only, which builds from the image with no hot-reload.
services:
  actus:
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./config:/app/config
      - ./scripts:/app/scripts
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload"
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 5

  postgres:
    ports:
      - "5432:5432"

volumes:
  ollama_data:
